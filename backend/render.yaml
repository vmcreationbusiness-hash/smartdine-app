services:
  - type: web
    name: smartdine-backend
    runtime: node
    rootDir: restaurant-improved/backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 8001
      - key: DB_NAME
        value: smartdine
      - key: RAZORPAY_KEY_ID
        value: rzp_test_placeholder
      - key: RAZORPAY_KEY_SECRET
        value: placeholder_secret
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
